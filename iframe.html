<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icons/nav/logo.svg">
    <title>orbit</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/iframe.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">

</head>

<body>
    <div class="navigation-bar">
        <ul class="nav-list">
            <li class="logo">
                <img src="icons/nav/logo.svg" class="navlogo" onclick="navigateInternal('/')">
            </li>

            <li class="tabs">
                <img src="icons/nav/g.svg" onclick="navigateInternal('g.html')">
                <img src="icons/nav/a.svg" onclick="navigateInternal('a.html')">
                <img src="icons/nav/s.svg" onclick="navigateInternal('s.html')">
            </li>
        </ul>
    </div>

    <div class="main">
        <div class="iframe-container">
            <iframe id="frame" allowfullscreen></iframe>
        </div>
        <div class="controls">
            <img src="c-icons/fullscreen.svg" alt="fullscreen" id="f">
            <img src="c-icons/refresh.svg" alt="reload" id="r">
            <img src="c-icons/openinwindow.svg" alt="aboutblank" id="b">
            <img src="c-icons/download.svg" alt="download" id="d">
            <img src="c-icons/link.svg" alt="link" id="l">
        </div>
    </div>

    <div id="info">
        <div class="battery">
            <img src="icons/nav/battery.svg" id="battery-icon" alt="battery icon">
            <p id="battery-text"></p>
        </div>
        <p>•</p>
        <p id="time"></p>
        <p>•</p>
        <p id="date"></p>
    </div>
</body>

<script src="js/particles.js"></script>
<script src="js/infoupdater.js"></script>
<script src="js/iframe.js"></script>
<script src="js/search.js"></script>
<script src="js/settings.js"></script>

<script>
    function navigateInternal(url) {
        window.location.href = url;
    }
</script>
</html>

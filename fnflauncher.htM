<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>fnflauncher</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/cmc2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Montserrat", sans-serif;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            background: linear-gradient(#080808, #040404);
        }

        .main { 
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        h2 {
            font-size: 36px;
            color: white;
            margin: 0 0 10px 0;
        }

        h3 {
            font-size: 18px;
            color: rgb(150, 150, 150);
            margin: 0 0 30px 0;
            transition: all 0.15s ease;
        }

        select.fnf-version {
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #252525;
            background: rgba(40,40,40,0.8);
            color: white;
            font-size: 16px;
            width: 80%;
            max-width: 300px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }

        select.fnf-version option {
            background-color: #181818;
            color: white;
        }

        select.fnf-version:focus {
            outline: none;
            border-color: #ff5e00;
            background: rgba(60,60,60,0.9);
        }

        .confirm-btn {
            padding: 10px;
            border-radius: 12px;
            font-size: 16px;
            border: 1px solid #252525;
            background: rgba(40,40,40,0.8);
            color: white;
            width: 80%;
            max-width: 300px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .confirm-btn:hover:enabled {
            background: rgba(70,70,70,0.9);
            transform: scale(1.05);
        }

        .confirm-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 600px) { /* just for it to fit on small screens, especially the iframe */
            h2 { font-size: 28px; }
            h3 { font-size: 16px; }
            select.fnf-version, .confirm-btn { 
                width: 90%; 
                font-size: 14px; 
            }
        }
    </style>
</head>
<body>
    <div class="main">
        <h2>friday night funkin' launcher</h2>
        <h3>choose a version of friday night  funkin' and hit play.</h3>
        <select id="version" class="fnf-version">
            <option value="" disabled selected hidden>select a version</option>
            <option value="fnf/Friday Night Funkin.htM">Friday Night Funkin' (normal)</option>
            <option value="fnf/Friday Night Funkin vs Carol V2.htM">vs Carol V2</option>
            <option value="fnf/Friday Night Funkin VS Imposter v4.htM">vs Imposter v4</option>
            <option value="fnf/Friday Night Funkin vs Nonsense.htM">vs Nonsense</option>
            <option value="fnf/Friday Night Funkin vs Shaggy.htM">vs Shaggy</option>
            <option value="fnf/Friday Night Funkin vs Sunday Remastered HD.htM">vs Sunday Remastered HD</option>
            <option value="fnf/Friday Night Funkin vs Tabi.htM">vs Tabi</option>
            <option value="fnf/Friday Night Funkin vs Undertale.htM">vs Undertale</option>
            <option value="fnf/Friday Night Funkin vs Zardy.htM">vs Zardy</option>
            <option value="fnf/Friday Night Funkin Vs. Cyber Sensation.htM">vs Cyber Sensation</option>
            <option value="fnf/Friday Night Funkin VS. KAPI.htM">vs KAPI</option>
            <option value="fnf/Friday Night Funkin Vs. Dave and Bambi v3.htM">vs Sky</option>
            <option value="fnf/Friday Night Funkin' D-Sides.htM">Friday Night Funkin' D-Sides</option>
            <option value="fnf/Friday Night Funkin' Drop and Roll, but Playable.htM">Friday Night Funkin' Drop and Roll, but Playable</option>
            <option value="fnf/Friday Night Funkin' Soft.htM">Friday Night Funkin' Soft</option>
            <option value="fnf/Friday Night Funkin' Sunday Night Suicide_ Rookies Edition.htM">Friday Night Funkin' Sunday Night Suicide: Rookies Edition</option>
            <option value="fnf/Friday Night Funkin' vs Hypno Lullaby.htM">vs Hypno Lullaby</option>
            <option value="fnf/Friday Night Funkin' VS Imposter B-Sides.htM">vs Imposter B-Sides</option>
            <option value="fnf/Friday Night Funkin' Wednesday's Infidelity.htM">Friday Night Funkin' Wednesday's Infidelity</option>
            <option value="fnf/Friday Night Funkin'_ 17 Bucks_ Floor 1.htM">Friday Night Funkin': 17 Bucks: Floor 1</option>
            <option value="fnf/Friday Night Funkin'_ AKAGE.htM">Friday Night Funkin': AKAGE</option>
            <option value="fnf/Friday Night Funkin'_ B-Sides.htM">Friday Night Funkin': B-Sides</option>
            <option value="fnf/Friday Night Funkin'_ Chaos Nightmare - Sonic Vs. Fleetway.htM">Chaos Nightmare - Sonic Vs. Fleetway</option>
        </select>
        <button class="confirm-btn" id="confirm" disabled>play</button>
    </div>

    <script>
        const select = document.getElementById("version");
        const button = document.getElementById("confirm");

        select.addEventListener("change", () => {
            button.disabled = !select.value;
        });

        button.addEventListener("click", () => {
            const url = select.value;
            if (!url) return;

            document.body.innerHTML = "";
            document.body.style.margin = "0";
            document.body.style.overflow = "hidden";

            const iframe = document.createElement("iframe");
            iframe.src = encodeURI(url);
            iframe.style.position = "fixed";
            iframe.style.top = "0";
            iframe.style.left = "0";
            iframe.style.width = "100vw";
            iframe.style.height = "100vh";
            iframe.style.border = "none";
            iframe.style.margin = "0";
            iframe.style.padding = "0";
            iframe.allowFullscreen = true;

            document.body.appendChild(iframe);
        });
    </script>
</body>
</html>

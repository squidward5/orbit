<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icons/nav/logo.svg">
    <title>orbit</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/iframe.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">

</head>

<body>
    <div class="navigation-bar">
        <ul class="nav-list">
            <li class="logo">
                <img src="icons/nav/logo.svg" class="navlogo" onclick="navigateInternal('/')">
            </li>

            <li class="tabs">
                <img src="icons/nav/g.svg" onclick="navigateInternal('g.html')">
                <img src="icons/nav/a.svg" onclick="navigateInternal('a.html')">
                <img src="icons/nav/s.svg" onclick="navigateInternal('s.html')">
            </li>
        </ul>
    </div>

    <div class="main">
        <h1>settings</h1>

        <div class="settings-grid">
            <div class="card">
                <h3>anti-close</h3>
                <p>prevents this tab from being accidentally closed.</p>
                <div class="btn-row">
                    <button data-setting="antiClose" data-value="true">enable</button>
                    <button data-setting="antiClose" data-value="false">disable</button>
                </div>
            </div>

            <div class="card">
                <h3>particles</h3>
                <p>the little white dots that float on this page.</p>
                <div class="btn-row">
                    <button data-setting="particles" data-value="true">enable</button>
                    <button data-setting="particles" data-value="false">disable</button>
                </div>
            </div>

            <div class="card">
                <h3>info display</h3>
                <p>the info display on the bottom of the page</p>
                <div class="btn-row">
                    <button data-setting="infodisplay" data-value="true">enable</button>
                    <button data-setting="infodisplay" data-value="false">disable</button>
                </div>
            </div>
        </div>
    </div>

    <div id="info">
        <div class="battery">
            <img src="icons/nav/battery.svg" id="battery-icon" alt="battery icon">
            <p id="battery-text"></p>
        </div>
        <p>•</p>
        <p id="time"></p>
        <p>•</p>
        <p id="date"></p>
    </div>
</body>

<script src="js/particles.js"></script>
<script src="js/messages.js"></script>
<script src="js/infoupdater.js"></script>
<script src="js/settings.js"></script>

<script>
    function navigateInternal(url) {
        window.location.href = url;
    }
</script>
</html>

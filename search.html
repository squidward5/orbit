<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icons/nav/logo.svg">
    <title>orbit</title>
    <link rel="stylesheet" href="css/search.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">

</head>

<body>
    <h1>still being developed. come back later!</h1>
    <a href="index.html">
        <img src="icons/nav/logo.svg">
    </a>
    <p>click the logo to go back</p>
    <iframe id="searchframe"></iframe>


    <div class="controls" id="controls" style="display: none;">

        <div class="topbar">
            <div class="hide" id="toggleControls"></div>
        </div>

        <a href="index.html">
            <img src="icons/nav/logo.svg">
        </a>

        <input type="text" id="search" class="search" placeholder="search for something...">

        <a id="back"><img src="c-icons/previous.png"></a>
        <a id="forward"><img src="c-icons/next.png"></a>
        <a id="refresh"><img src="c-icons/refresh.svg"></a>

    </div>
</body>

<script src="js/iframe.js"></script>
<script src="js/search.js"></script>

<script>
    function navigateInternal(url) {
        window.location.href = url;
    }

    const controls = document.getElementById("controls");
    const toggle = document.getElementById("toggleControls");

    let hidden = false;

    toggle.addEventListener("click", () => {
        hidden = !hidden;
        controls.classList.toggle("hidden", hidden);
    });
</script>
</html>
